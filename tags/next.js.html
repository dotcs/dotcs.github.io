ass="bg-teal-500"><nav class="flex items-center justify-between flex-wrap container mx-auto py-6 px-4"><a href="/"><div class="flex items-center flex-shrink-0 text-white mr-6"><span class="font-semibold text-xl tracking-tight font-mono">[dotcs.me ~]$ <span class="x-logo-ticker">█</span></span></div></a><div class="block lg:hidden"><button class="flex items-center px-3 py-2 border rounded text-teal-200 border-teal-400 hover:text-white hover:border-white"><svg class="fill-current h-3 w-3" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><title>Menu</title><path d="M0 3h20v2H0V3zm0 6h20v2H0V9zm0 6h20v2H0v-2z"></path></svg></button></div><div class="w-full block flex-grow lg:flex lg:items-center lg:w-auto hidden"><div class="text-sm lg:flex-grow"><a class="block mt-4 lg:inline-block lg:mt-0 text-teal-200 hover:text-white mr-4" href="/">Blog</a><a class="block mt-4 lg:inline-block lg:mt-0 text-teal-200 hover:text-white mr-4" href="/pages/about-me">About me</a></div></div></nav></div><div class="bg-white container mx-auto flex-grow"><div class="px-4 lg:px-24 py-4"><h1 class="text-xl mt-2 mb-8">Tag: <span class="">next.js</span></h1><div class="mb-12"><h2 class="text-3xl font-semibold mb-1"><a class="x-link" href="/posts/nextjs-github-pages">How to deploy a Next.js application to GitHub pages</a></h2><p class="font-thin mb-2 text-sm">posted on <!-- -->2020-11-16<!-- --> by <!-- -->dotcs</p><p class="mb-2"></p><div class="text-sm"><i class="las la-tags align-middle"></i><ul class="inline-block text-gray-800"><li class="inline-block ml-2"><a class="x-link" href="/tags/next.js">next.js</a></li><li class="inline-block ml-2"><a class="x-link" href="/tags/tech">tech</a></li></ul></div></div></div></div><div class="p-4 mt-8 bg-white text-center antialiased text text-gray-700 border-t-2"><div class="container mx-auto"><p>All work licensed under<a class="mx-1 text-xl align-middle" href="/pages/license-information"><i class="lab la-creative-commons" title="Creative commons"></i><i class="lab la-creative-commons-by" title="Attribution"></i><i class="lab la-creative-commons-sa" title="Share alike"></i></a>unless otherwise stated.</p><ul class="flex flex-col mt-4 sm:mt-0 sm:flex-row justify-center"><li class="px-2 mb-2 sm:mb-0"><a class="x-link" href="/pages/license-information">License Info</a></li><li class="px-2 mb-2 sm:mb-0"><a class="x-link" href="/pages/privacy">Privacy</a></li><li class="px-2 mb-2 sm:mb-0"><a class="x-link" href="/pages/imprint">Imprint</a></li></ul></div></div></div></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"tag":"next.js","posts":[{"attributes":{"title":"How to deploy a Next.js application to GitHub pages","excerpt":null,"keywords":["next.js","tech"],"authors":["dotcs"],"published_at":"2020-11-16T22:56:02+01:00","updated_at":"2020-11-16T22:56:02+01:00","slug":"nextjs-github-pages"},"body":"[Next.js] is becoming very popular - for good reasons.\nTo me it's one of the best frameworks out there to create all kinds of web pages that are based on [React].\nSince Next.js does allow for full server-side rendering and [static html exports][next-static], pages can be rendered completely on the server and delivered to the client as dump static HTML pages with a little bit of CSS and JavaScript where needed.\nThis makes them perfectly suitable to be hosted on [GitHub pages][github-pages].\n\nMy first thought was: Yeah, easy let's do this quickly.\nBut not so fast!\nI've leared that there are a few things that require tweaks.\n\n## Use GitHub Actions to build and export Next.js pages\n\nI use GitHub actions to build the static pages.\nThe corresponding project setting is set to deliver pages from the `gh-pages` branch.\n\n![GitHub Pages settings to deliver from branch gh-pages](/posts/nextjs-github-pages/github-pages-settings.png)\n\nThe corresponding `.github/workflows/gh-pages.yml` is simple.\nNote that the `npm run export` script has an enviroment variable `DEPLOY_TARGET: gh-pages` attached to it.\nThis env variable will be used in the second step.\nIn the deploy step the branch is set to `gh-pages` and we deliver results from the `out` folder, which is the default target folder for the `next export` command.\n\nAlso note that the pipelie creates the (empty) file `out/.nojekyll`.\nThis is necessary to bypass Jekyll processing on GitHub pages as mentioned [here][gh-pages-jekyll].\nOtherwise folders that start with an underscore are ignored, but Next.js puts merged assets, e.g. CSS and JS files, into a folder `_next`. 😵\n\n```yaml\nname: Build and Deploy\non:\n  push:\n    branches:\n      - master\njobs:\n  build-and-deploy:\n    runs-on: ubuntu-latest\n    steps:\n      - name: Checkout\n        uses: actions/checkout@v2.3.1\n        with:\n          persist-credentials: false\n\n      - name: Install and Build\n        uses: actions/setup-node@v1\n      - run: npm install\n      - run: npm run build     # runs `next build`\n      - run: npm run export    # runs `next export`\n        env:\n          CI: true\n          DEPLOY_TARGET: gh-pages\n      - run: touch out/.nojekyll\n\n      - name: Deploy\n        uses: JamesIves/github-pages-deploy-action@3.7.1\n        with:\n          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}\n          BRANCH: gh-pages  # The branch the action should deploy to.\n          FOLDER: out       # The folder the action should deploy.\n          CLEAN: true       # Automatically remove deleted files from the deploy branch\n```\n\n\n## Rewrite paths to static files\n\nWhen serving websites via `\u003cusername\u003e.github.io` any static assets must point to `\u003cusername\u003e.github.io/\u003cprojectname\u003e` with `\u003cprojectname\u003e` being the name of the repository (typically again `\u003cusername\u003e.github.io`).\nGitHub Pages rewrites some paths internally, so that they **appear** to come from `\u003cusername\u003e.github.io`, but things will not work out if the `\u003cprojectname\u003e` part is missing.\n\n`next export` allows to set a `assetPrefix`, which tweaking the URL paths and re-write them from `/` to `/\u003cassetPrefix\u003e/`.\nThis can be configured in the project's `next.config.js`:\n\n```js\nconst ghPages = process.env.DEPLOY_TARGET === 'gh-pages';\n\nmodule.exports = {\n  assetPrefix: ghPages ? '/dotcs.github.io/' : ''   // customize this value\n};\n```\n\nWith this line in place we detect if we're executed by the GitHub Action runner and re-write paths accordingly.\n\n## Success\n\nWith those tweaks Next.js pages can be hosted via GitHub pages easily.\nYou just need to be aware of them. 😉\n\n\n[next.js]: https://nextjs.org\n[react]: https://reactjs.org\n[next-static]: https://nextjs.org/docs/advanced-features/static-html-export\n[redux]: https://redux.js.org\n[react-hooks]: https://reactjs.org/docs/hooks-intro.html\n[github-pages]: https://pages.github.com\n[gh-pages-jekyll]: https://github.blog/2009-12-29-bypassing-jekyll-on-github-pages/","bodyBegin":13,"frontmatter":"title: How to deploy a Next.js application to GitHub pages\nexcerpt: \nkeywords:\n  - tech\n  - next.js\nauthors:\n  - dotcs\npublished_at: \"2020-11-16T22:56:02+01:00\"\nupdated_at: \"2020-11-16T22:56:02+01:00\""}],"settings":{"title":"dotcs.me","baseUrl":"https://dotcs.me","description":"Foobar"}},"__N_SSG":true},"page":"/tags/[slug]","query":{"slug":"next.js"},"buildId":"_VEZz9GXIYdeM8co4KaIf","nextExport":false,"isFallback":false,"gsp":true}</script><script nomodule="" src="/_next/static/chunks/polyfills-d2fc0a4bf0d27c7e92ce.js"></script><script src="/_next/static/chunks/main-3aa73cae329507950c31.js" async=""></script><script src="/_next/static/chunks/webpack-3866a5765bde9782de2a.js" async=""></script><script src="/_next/static/chunks/framework.d557686129d5a5cc0c94.js" async=""></script><script src="/_next/static/chunks/commons.c326fb833cc5579beb78.js" async=""></script><script src="/_next/static/chunks/pages/_app-fba1e48846184c59c42b.js" async=""></script><script src="/_next/static/chunks/d6d343f3.acdc88755e55ded238c8.js" async=""></script><script src="/_next/static/chunks/5b8eacbb51d5ec1c748b50dab9c339158bbf085e.a72034a3333b22f207fd.js" async=""></script><script src="/_next/static/chunks/pages/tags/%5Bslug%5D-5fde5238870c513c936c.js" async=""></script><script src="/_next/static/_VEZz9GXIYdeM8co4KaIf/_buildManifest.js" async=""></script><script src="/_next/static/_VEZz9GXIYdeM8co4KaIf/_ssgManifest.js" async=""></script></body></html>
